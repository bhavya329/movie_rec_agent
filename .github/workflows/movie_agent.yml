# .github/workflows/movie_agent.yml
#
# Runs the Movie Recommendation Agent every Friday at 7:00 PM IST
# (IST = UTC+5:30, so 7 PM IST = 13:30 UTC)
#
# You can also trigger it manually from the GitHub Actions tab
# using the "Run workflow" button for testing.

name: Movie Recommendation Agent

on:
  # ── Automatic: every Friday at 7:00 PM IST ──────────────────────────────
  schedule:
    - cron: "30 13 * * 5"   # UTC 13:30 = IST 19:00 (7 PM) every Friday

  # ── Manual trigger: test whenever you want ───────────────────────────────
  workflow_dispatch:

jobs:
  run-agent:
    name: Run movie agent and send email
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out your repository ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Set up Python ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      # ── 4. Run the agent ─────────────────────────────────────────────────
      #    Secrets are injected as environment variables.
      #    Set these in: GitHub repo → Settings → Secrets and variables → Actions
      - name: Run Movie Recommendation Agent
        env:
          TMDB_API_KEY:        ${{ secrets.TMDB_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS:     ${{ secrets.RECIPIENT_EMAIL }}
          GITHUB_REPO: ${{ github.repository }}
        run: python agents.py

      # ── 5. Upload logs as artifact (optional but useful for debugging) ──
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: agent-log-${{ github.run_id }}
          path: "*.log"
          if-no-files-found: ignore
          retention-days: 7