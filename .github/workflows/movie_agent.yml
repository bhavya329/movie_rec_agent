name: Movie Recommendation Agent

on:
  schedule:
    - cron: "30 13 * * 5"
  workflow_dispatch:

jobs:
  run-agent:
    name: Run movie agent and send email
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Parse feedback emails
        env:
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN:        ${{ secrets.ACCESS_TOKEN }}
          GITHUB_REPO:         ${{ github.repository }}
        run: python parse_feedback.py
        continue-on-error: true

      - name: Run Movie Recommendation Agent
        env:
          TMDB_API_KEY:        ${{ secrets.TMDB_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS:    ${{ secrets.RECIPIENT_EMAIL }}
          GITHUB_TOKEN:        ${{ secrets.ACCESS_TOKEN }}
          GITHUB_REPO:         ${{ github.repository }}
        run: python agent.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: agent-log-${{ github.run_id }}
          path: "*.log"
          if-no-files-found: ignore
          retention-days: 7